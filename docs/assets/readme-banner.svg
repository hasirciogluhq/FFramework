      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <radialGradient id="glowT" cx="50%" cy="0%" r="70%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.22"/>
